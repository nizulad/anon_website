<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Secure Chat</title>
    <style>
        body { margin: 0; font-family: sans-serif; background: #121212; color: white; }
        #auth-screen { display: flex; justify-content: center; align-items: center; height: 100vh; }
        .auth-box { background: #1e1e1e; padding: 30px; border-radius: 10px; width: 80%; max-width: 300px; text-align: center; }
        input { width: 100%; padding: 10px; margin: 10px 0; border-radius: 5px; border: none; background: #333; color: white; box-sizing: border-box; }
        button { width: 100%; padding: 10px; border: none; border-radius: 5px; background: #007bff; color: white; cursor: pointer; }
        #chat-screen { display: none; flex-direction: column; height: 100vh; }
        #messages { list-style: none; margin: 0; padding: 15px; flex-grow: 1; overflow-y: auto; }
        #messages li { margin-bottom: 10px; padding: 8px; background: #222; border-radius: 5px; }
        #form { background: #1e1e1e; padding: 10px; display: flex; border-top: 1px solid #333; }
        #input { border: none; padding: 10px; flex-grow: 1; border-radius: 5px; background: #333; color: white; margin-right: 10px; }
        .header { background: #007bff; padding: 15px; text-align: center; font-weight: bold; }
        #admin-panel { background: #2c2c2c; padding: 10px; display: none; border-bottom: 1px solid #444; text-align: center; }
    </style>
</head>
<body>

    <div id="auth-screen">
        <div class="auth-box">
            <h2>Anon chat</h2>
            <h3>to sign up enter a username and a password then click request access</h3>
            <input id="user-input" placeholder="Username">
            <input id="pass-input" type="password" placeholder="Password">
            <button onclick="login()">Login</button>
            <button style="background: #28a745; margin-top:10px;" onclick="signup()">Request Access</button>
            <p id="auth-msg" style="color: #ff4444; font-size: 0.8em;"></p>
        </div>
    </div>

    <div id="chat-screen">
        <div class="header" id="room-label">Room: Loading...</div>
        <div id="admin-panel">
            <label>Switch Room: </label>
            <select id="room-select" onchange="switchRoom()" style="background:#444; color:white; border:none; padding:5px;">
                <option value="general">general</option>
                <option value="room 1">room 1</option>
                <option value="Secret Lounge">Secret Lounge</option>
                <option value="room 2">room 2</option>
                <option value="room 3">room 3</option>
                <option value="room 4">room 4</option>
            </select>
        </div>
        <ul id="messages"></ul>
        <form id="form">
            <input id="input" autocomplete="off" placeholder="Message..." /><button>Send</button>
        </form>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        let socket = io(), currentUser = null, currentRoom = null;

        async function login() {
            const user = document.getElementById('user-input').value;
            const pass = document.getElementById('pass-input').value;
            const res = await fetch('/login', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ username: user, password: pass })
            });
            const data = await res.json();

            if (res.ok) {
                currentUser = data;
                currentRoom = data.room;
                document.getElementById('auth-screen').style.display = 'none';
                document.getElementById('chat-screen').style.display = 'flex';
                document.getElementById('room-label').innerText = "Room: " + currentRoom;
                
                // Show switcher only if admin
                if(currentUser.role === 'super') document.getElementById('admin-panel').style.display = 'block';

                socket.emit('join room', { username: currentUser.username, room: currentRoom });
            } else {
                document.getElementById('auth-msg').innerText = data.error;
            }
        }

        function switchRoom() {
            currentRoom = document.getElementById('room-select').value;
            document.getElementById('messages').innerHTML = '';
            document.getElementById('room-label').innerText = "Room: " + currentRoom;
            socket.emit('join room', { username: currentUser.username, room: currentRoom });
        }

        async function signup() {
            const user = document.getElementById('user-input').value;
            const pass = document.getElementById('pass-input').value;
            const res = await fetch('/signup', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ username: user, password: pass })
            });
            const data = await res.json();
            document.getElementById('auth-msg').innerText = data.message || data.error;
        }

        document.getElementById('form').addEventListener('submit', (e) => {
            e.preventDefault();
            const input = document.getElementById('input');
            if (input.value && currentUser) {
                socket.emit('chat message', {
                    text: input.value, username: currentUser.username,
                    room: currentRoom, color: currentUser.color
                });
                input.value = '';
            }
        });

        socket.on('chat message', (msg) => { addMessage(msg); });
        socket.on('load history', (history) => { history.forEach(addMessage); });

        function addMessage(msg) {
            const item = document.createElement('li');
            item.innerHTML = `<span style="color:${msg.color}"><b>${msg.username}:</b></span> ${msg.text}`;
            document.getElementById('messages').appendChild(item);
            document.getElementById('messages').scrollTop = document.getElementById('messages').scrollHeight;
        }
    </script>
</body>
</html>
